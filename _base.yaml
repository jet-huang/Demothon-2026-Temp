services:
  _base:
    restart: unless-stopped
    networks:
      - sam-local-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"    # Limits each file to 10MB
        max-file: "5"      # Keeps up to 5 files before rotating
    extra_hosts: 
      - "host.docker.internal:host-gateway"
    # env_file: shared.env