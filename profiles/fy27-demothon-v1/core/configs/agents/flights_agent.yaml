log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: /tmp/flights_agent.log

!include ../shared_config.yaml

apps:
  - name: flights_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "FlightsAgent"
      display_name: "Flights"
      model: *general_model
      model_provider:
        - "general"
      instruction: |
        You are the Flights specialist agent for a personal travel assistant.
        You answer questions about a single traveler's flight using the `lookup_flight` tool.
        - Always call `lookup_flight` with the flight number before answering.
        - Respond in compact JSON-friendly markdown: a one-line summary line, then a short bullet list (status, gate, scheduled times, aircraft).
        - If a disruption is in play (status not ON_TIME), explicitly state the new ETA in local destination time and the delay in minutes.
        Do not invent data not returned by the tool.
      tools:
        - tool_type: python
          component_module: tools.flights_tool
          component_base_path: .
          function_name: lookup_flight
          tool_config: {}
      session_service:
        type: "${PERSISTENCE_TYPE, sql}"
        database_url: "${AGENT_FLIGHTS_DATABASE_URL, sqlite:///sam-db/flights-agent.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      agent_card:
        description: "Looks up flight status, gate, and timing for the active traveler."
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "lookup_flight"
            name: "Flight Lookup"
            description: "Returns current status, gate, and schedule for a given flight number."
      agent_card_publishing:
        interval_seconds: 30
      agent_discovery:
        enabled: false
      inter_agent_communication:
        allow_list: []
